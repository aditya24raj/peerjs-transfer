<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>peerjs-transfer</title>
    <link rel="icon" href="favicon.svg" />

    <link rel="stylesheet" href="styles/style.css">
    <script type="module" src="scripts/main.js" defer></script>

    <script src="./scripts/lib/peerjs.min.js"></script>
    <script src="./scripts/lib/qrcode.js"></script>
</head>

<body style="font-family: monospace;">
    <div id="app" style="max-width: 600px; margin: auto; margin-top: 15px;">
        <h1 style="color: blue;">
            peerjs-transfer
        </h1>

        <div style="margin-top: -15px;">Transfer text &amp; files</div>

        <div style="margin-top: 18px">
            <div style="display: flex; gap: 10px; margin: 15px 0px;">
                <div id="qrcode" style="width: 100px; height: 100px; background-color:blue"></div>
                <div>
                    <h2>ID</h2>
                    <p id="peerId" style="font-weight: bold;">[loading...]</p>
                    <a id="copyIdButton" href="">copy</a>
                </div>
            </div>
        
        </div>
        <div style="color: gray; font-weight:lighter">
            <div>use ID or scan QR code to connect</div>
        </div>



        <div style="margin-top: 36px;">
            <form>
                <label id="destIdLabel" for="destId">Connect to ID: </label>
                <br />
                <input type="text" name="destId" id="destId" required />

                <button id="connectButton">Connect</button>
                <button id="disconnectButton" disabled>Disconnect</button>
            </form>
        </div>

        <div style="margin-top: 36px;">
            <form>
                <input type="text" name="message" id="message" placeholder="Hi" />
                <input type="file" name="file" id="file" />

                <button id="sendMessageButton" disabled>Send</button>

            </form>
        </div>

        <div id="logs"
            style="height: 300px; border-left: 1px solid black; margin-top: 15px; padding: 10px 6px; overflow-y: auto;">
            <h3>Transfer Log</h3>

        </div>

    </div>
</body>

</html>
